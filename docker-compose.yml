services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - uploads-data:/app/uploads
      - db-data:/app/data
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=change-this-secret-in-production
    restart: unless-stopped

volumes:
  uploads-data:
  db-data:
